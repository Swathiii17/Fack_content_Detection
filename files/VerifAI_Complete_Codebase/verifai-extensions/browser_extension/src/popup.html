<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VerifAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a18;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
    }
    .logo { font-size: 16px; font-weight: 500; }
    .logo span { color: #185FA5; }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #639922; display: inline-block; margin-right: 5px;
    }
    .status-text { font-size: 11px; color: #6b6a64; }
    .section { padding: 12px 16px; border-bottom: 0.5px solid rgba(0,0,0,0.06); }
    .section-label {
      font-size: 10px; font-weight: 500; color: #888780;
      text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px;
    }
    .btn {
      width: 100%; padding: 8px 12px;
      background: #1a1a18; color: #fff;
      border: none; border-radius: 7px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      margin-bottom: 6px; text-align: left;
      display: flex; align-items: center; gap: 8px;
    }
    .btn:hover { background: #2c2c2a; }
    .btn-secondary {
      background: transparent;
      color: #1a1a18;
      border: 0.5px solid rgba(0,0,0,0.15);
    }
    .btn-secondary:hover { background: #f5f4f0; }
    .btn-icon {
      width: 18px; height: 18px; border-radius: 4px;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; flex-shrink: 0;
    }
    .btn-secondary .btn-icon { background: rgba(0,0,0,0.06); }
    .shortcut {
      font-size: 11px; color: #888780;
      background: #f1efe8; padding: 2px 6px;
      border-radius: 4px; margin-left: auto;
    }
    textarea {
      width: 100%; height: 72px;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 6px; padding: 8px;
      font-size: 12px; font-family: inherit;
      resize: none; color: #1a1a18;
      background: #f9f8f5; outline: none;
      margin-bottom: 6px;
    }
    .type-row { display: flex; gap: 5px; margin-bottom: 8px; }
    .type-btn {
      font-size: 11px; padding: 3px 10px;
      border-radius: 99px; border: 0.5px solid rgba(0,0,0,0.12);
      cursor: pointer; background: transparent; color: #6b6a64;
    }
    .type-btn.active {
      background: #185FA5; color: #fff; border-color: #185FA5;
    }
    .last-result { padding: 12px 16px; }
    .result-badge {
      display: inline-block; font-size: 11px; font-weight: 500;
      padding: 2px 9px; border-radius: 99px; margin-bottom: 6px;
    }
    .result-reasoning {
      font-size: 11px; color: #3d3d3a; line-height: 1.5; margin-bottom: 6px;
    }
    .result-meta { font-size: 10px; color: #888780; }
    .open-link {
      display: block; text-align: center; font-size: 11px;
      color: #185FA5; text-decoration: none; padding: 10px;
      border-top: 0.5px solid rgba(0,0,0,0.06);
    }
    .open-link:hover { text-decoration: underline; }
    .empty { padding: 20px 16px; text-align: center; color: #888780; font-size: 12px; }
    #status-section { display: flex; align-items: center; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Verif<span>AI</span></div>
    <div id="status-section">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">Checking backend...</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Analyse current page</div>
    <button class="btn" id="btn-page">
      <div class="btn-icon">N</div>
      Check this news page
      <span class="shortcut">Alt+V</span>
    </button>
    <button class="btn btn-secondary" id="btn-selection">
      <div class="btn-icon" style="background:rgba(0,0,0,0.06)">S</div>
      Analyse selected text
    </button>
  </div>

  <div class="section">
    <div class="section-label">Paste content</div>
    <div class="type-row">
      <button class="type-btn active" data-type="news">News</button>
      <button class="type-btn" data-type="review">Review</button>
    </div>
    <textarea id="paste-input" placeholder="Paste a claim, article, or review text here..."></textarea>
    <button class="btn" id="btn-paste">
      <div class="btn-icon">A</div>
      Analyse pasted content
    </button>
  </div>

  <div id="last-result-section" style="display:none"></div>

  <a href="http://localhost:5173" target="_blank" class="open-link">
    Open VerifAI dashboard ↗
  </a>

  <script src="popup.js"></script>
</body>
</html>
